<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronograma Huangzin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --twitch-purple: #9146ff; --bg-dark: #0e0e10; --card-bg: #1f1f23; --accent: #00ff7f; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 20px; }
        
        /* AJUSTE DE TAMANHO: Pequeno no celular, Grande no PC */
        .container { width: 100%; margin: auto; transition: 0.3s; }
        
        @media (min-width: 900px) {
            .container { max-width: 1000px; } /* No PC o site fica bem largo */
            .prices { grid-template-columns: repeat(3, 1fr) ! desperation; }
            h1 { font-size: 2.5rem !important; }
        }

        @media (max-width: 899px) {
            .container { max-width: 450px; } /* No Celular continua compacto */
            .prices { grid-template-columns: 1fr 1fr; }
        }

        .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid var(--twitch-purple); padding-bottom: 15px; }
        
        .prices { display: grid; gap: 15px; margin-bottom: 30px; }
        .p-item { background: var(--card-bg); padding: 15px; border-radius: 10px; border-left: 5px solid var(--twitch-purple); }
        .p-item b { color: var(--accent); font-size: 1.2rem; display: block; }

        .order-box { background: #18181b; padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #26262c; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; }

        .btn-pix { background: var(--accent); color: black; border: none; width: 100%; padding: 20px; border-radius: 10px; font-weight: 900; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; }

        .fila-title { font-size: 1.5rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .dot { height: 12px; width: 12px; background-color: #ff4646; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .card { background: var(--card-bg); margin-bottom: 12px; padding: 20px; border-radius: 12px; border: 1px solid #2d2d30; display: flex; justify-content: space-between; align-items: center; }
        .card strong { font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>🎥 CRONOGRAMA HUANGZIN</h1></div>

    <div class="prices">
        <div class="p-item"><b>R$ 10</b> Desenho (20m)</div>
        <div class="p-item"><b>R$ 15</b> Anime (25m)</div>
        <div class="p-item"><b>R$ 20</b> Série (30m)</div>
        <div class="p-item"><b>R$ 30</b> Série (1h)</div>
        <div class="p-item)<b>R$ 40</b> Filme (Até 2h)</div>
        <div class="p-item"><b>R$ 50</b> Filme (2h+)</div>
    </div>

    <div class="order-box">
        <input type="text" id="filme" placeholder="Nome do Filme / Série / Anime">
        <input type="text" id="episodios" placeholder="Temporada/Episódio">
        <input type="text" id="usuario" placeholder="Seu Nick">
        <button onclick="processarTudo()" class="btn-pix">PATROCINAR E ATUALIZAR</button>
    </div>

    <div class="fila-title"><span class="dot"></span> LISTA DE EXIBIÇÃO</div>
    <div id="lista-fila">Carregando...</div>
</div>

<script>
    const planilha_csv = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSA7ERgcG00cVALxrJrFC_zTlKLNHULOf6QGdKqYP1t7jFop-Bc80yfEbHR5Bb5jmns1GYlInDp_xGX/pub?output=csv';
    const link_pagamento = 'https://livepix.gg/huangzin';
    const script_google = 'https://script.google.com/macros/s/AKfycbx7RbAzGssI2lR3qqv54SBnSfKRpETWDlwYbVDxTPBwux-qhs29tfhfUujE8kt1RW-rng/exec';

    function processarTudo() {
        const f = document.getElementById('filme').value;
        const e = document.getElementById('episodios').value;
        const u = document.getElementById('usuario').value;

        if(!f || !u) return alert("Preencha os campos!");

        // 1. Envia para a Planilha via Script
        fetch(script_google, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({conteudo: f, patrocinador: u, duracao: e})
        });

        // 2. Abre o Pix
        const msg = `PEDIDO: ${f} (${e}) | NICK: ${u}`;
        window.open(`${link_pagamento}?msg=${encodeURIComponent(msg)}`, '_blank');
        
        alert("Pedido enviado! Atualize a página em alguns segundos.");
    }

    function atualizarFila() {
        Papa.parse(planilha_csv, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(res) {
                const div = document.getElementById('lista-fila');
                div.innerHTML = '';
                res.data.reverse().forEach(item => { // Inverte para ver os novos primeiro
                    if(item.Conteúdo || item[0]) {
                        div.innerHTML += `
                            <div class="card">
                                <div>
                                    <strong>${item.Conteúdo || item.conteudo}</strong>
                                    <div style="color:#adadb8; font-size:0.9rem">Por: ${item.Patrocinador || item.patrocinador}</div>
                                </div>
                                <div style="color:var(--accent); font-weight:bold">${item.Status || 'FILA'}</div>
                            </div>
                        `;
                    }
                });
            }
        });
    }

    setInterval(atualizarFila, 15000);
    window.addEventListener('DOMContentLoaded', atualizarFila);
</script>
</body>
</html>
