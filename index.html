<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma Huangzin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --twitch-purple: #9146ff; --bg-dark: #0e0e10; --card-bg: #1f1f23; --accent: #00ff7f; }
        
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 15px; line-height: 1.5; }
        .container { max-width: 500px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 2px solid var(--twitch-purple); }
        h1 { font-size: 1.5rem; margin: 0; }

        /* Formulário de Patrocínio */
        .order-form { background: #18181b; padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #2d2d30; }
        .order-form h2 { font-size: 1.1rem; margin-top: 0; color: var(--accent); }
        
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #adadb8; }
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            background: #26262c; border: 1px solid #3f3f46; 
            color: white; border-radius: 6px; font-size: 1rem;
        }

        /* Grid de Preços Otimizado */
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .price-item { background: var(--card-bg); padding: 10px; border-radius: 6px; border-left: 3px solid var(--twitch-purple); font-size: 0.75rem; }
        .price-item b { color: var(--accent); display: block; font-size: 0.9rem; }

        /* Fila */
        .fila-title { font-size: 1.2rem; margin: 20px 0 15px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .live-dot { height: 10px; width: 10px; background-color: #ff0000; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .card { background: var(--card-bg); margin-bottom: 10px; padding: 15px; border-radius: 8px; border: 1px solid transparent; display: flex; flex-direction: column; gap: 5px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card strong { font-size: 1rem; color: #fff; }
        .card small { color: #adadb8; font-size: 0.85rem; }
        .status-badge { background: var(--twitch-purple); padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; align-self: flex-start; }

        .btn-pay { 
            background: var(--accent); color: black; border: none; width: 100%; 
            padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1rem; 
            cursor: pointer; transition: 0.2s; text-decoration: none; display: block; text-align: center;
        }
        .btn-pay:hover { opacity: 0.9; transform: translateY(-2px); }

        @media (max-width: 400px) {
            h1 { font-size: 1.2rem; }
            .price-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎥 Cronograma Huangzin</h1>
    </div>

    <!-- Tabela de Referência -->
    <div class="price-grid">
        <div class="price-item"><b>R$ 5</b> Desenho (20m)</div>
        <div class="price-item"><b>R$ 8</b> Anime (25m)</div>
        <div class="price-item"><b>R$ 10</b> Série (30m)</div>
        <div class="price-item"><b>R$ 25</b> Filme (2h)</div>
    </div>

    <!-- Formulário de Pedido -->
    <div class="order-form">
        <h2>Patrocinar Conteúdo</h2>
        <label>Nome do Filme / Série / Anime</label>
        <input type="text" id="obra" placeholder="Ex: Shrek 2">
        
        <label>Temporada / Episódio / Quantidade</label>
        <input type="text" id="episodio" placeholder="Ex: Ep 01 a 05">
        
        <label>Seu Nome (Twitch)</label>
        <input type="text" id="nick" placeholder="Seu Nick">

        <button onclick="gerarPagamento()" class="btn-pay">PAGAR VIA PIX</button>
    </div>

    <div class="fila-title"><span class="live-dot"></span> Ordem de Exibição</div>
    <div id="fila-conteudo">Carregando lista...</div>
</div>

<script>
    // Substitua pelo seu link da planilha CSV
    const csv_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSA7ERgcG00cVALxrJrFC_zTlKLNHULOf6QGdKqYP1t7jFop-Bc80yfEbHR5Bc5jmns1GYlInDp_xGX/pub?output=csv';
    // Substitua pelo seu link do LivePix
    const livepix_url = 'https://livepix.gg/huangzin';

    function gerarPagamento() {
        const obra = document.getElementById('obra').value;
        const ep = document.getElementById('episodio').value;
        const nick = document.getElementById('nick').value;

        if(!obra || !nick) {
            alert("Por favor, preencha o nome do filme e seu nick!");
            return;
        }

        // Isso cria a mensagem que vai aparecer no seu LivePix
        const mensagem = `PATROCINIO: ${obra} - ${ep} (Por: ${nick})`;
        const urlFinal = `${livepix_url}?msg=${encodeURIComponent(mensagem)}`;
        
        window.open(urlFinal, '_blank');
    }

    function carregarFila() {
        Papa.parse(csv_url, {
            download: true,
            header: true,
            complete: function(results) {
                const container = document.getElementById('fila-conteudo');
                container.innerHTML = '';
                results.data.forEach(item => {
                    if(item.Conteúdo) {
                        container.innerHTML += `
                            <div class="card">
                                <div class="card-header">
                                    <strong>${item.Conteúdo}</strong>
                                    <div class="status-badge">${item.Status || 'FILA'}</div>
                                </div>
                                <small>Patrocinado por: <b>${item.Patrocinador}</b></small>
                                <small>Duração: ${item.Duração || '--'}</small>
                            </div>
                        `;
                    }
                });
            }
        });
    }

    setInterval(carregarFila, 20000); // Atualiza a cada 20 segundos
    window.addEventListener('DOMContentLoaded', carregarFila);
</script>

</body>
</html>
