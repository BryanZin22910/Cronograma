<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronograma Huangzin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --twitch-purple: #9146ff; --bg-dark: #0e0e10; --card-bg: #1f1f23; --accent: #00ff7f; }
        
        /* Reset para suavidade no celular */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            margin: 0; 
            padding: 15px;
            overscroll-behavior: none; /* Evita puxar para atualizar e travar */
        }
        
        .container { max-width: 450px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--twitch-purple); padding-bottom: 10px; }
        h1 { font-size: 1.4rem; letter-spacing: 1px; }

        /* Tabela de Preços Atualizada */
        .prices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .p-item { 
            background: var(--card-bg); 
            padding: 12px; 
            border-radius: 8px; 
            border-left: 4px solid var(--twitch-purple);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .p-item b { color: var(--accent); font-size: 1.1rem; display: block; }
        .p-item span { font-size: 0.8rem; color: #adadb8; }

        /* Formulário Otimizado */
        .order-box { 
            background: #18181b; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border: 1px solid #333;
        }
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 10px; 
            background: #26262c; 
            border: 1px solid #3f3f46; 
            color: white; 
            border-radius: 8px; 
            font-size: 16px; /* Impede o zoom automático no iPhone ao clicar */
        }

        .btn-pix { 
            background: var(--accent); 
            color: black; 
            border: none; 
            width: 100%; 
            padding: 18px; 
            border-radius: 10px; 
            font-weight: 900; 
            font-size: 1.1rem; 
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Fila */
        .fila-title { font-size: 1.2rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .dot { height: 10px; width: 10px; background-color: #ff4646; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .card { 
            background: var(--card-bg); 
            margin-bottom: 10px; 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid #2d2d30;
        }
        .card strong { font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .card-info { font-size: 0.85rem; color: #adadb8; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎥 CRONOGRAMA HUANGZIN</h1>
    </div>

    <!-- Valores Aumentados -->
    <div class="prices">
        <div class="p-item"><b>R$ 10</b><span>Desenho (20m)</span></div>
        <div class="p-item"><b>R$ 15</b><span>Anime (25m)</span></div>
        <div class="p-item"><b>R$ 20</b><span>Série (30m)</span></div>
        <div class="p-item"><b>R$ 30</b><span>Série (1h)</span></div>
        <div class="p-item"><b>R$ 40</b><span>Filme (Até 2h)</span></div>
        <div class="p-item"><b>R$ 50</b><span>Filme (2h+)</span></div>
    </div>

    <div class="order-box">
        <input type="text" id="filme" placeholder="Filme / Série / Anime">
        <input type="text" id="episodios" placeholder="Episódios ou Filme Completo">
        <input type="text" id="usuario" placeholder="Seu Nick">
        <button onclick="enviarPix()" class="btn-pix">PATROCINAR VIA PIX</button>
    </div>

    <div class="fila-title"><span class="dot"></span> LISTA DE EXIBIÇÃO</div>
    <div id="lista-fila">Carregando fila...</div>
</div>

<script>
    const planilha_csv = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSA7ERgcG00cVALxrJrFC_zTlKLNHULOf6QGdKqYP1t7jFop-Bc80yfEbHR5Bc5jmns1GYlInDp_xGX/pub?output=csv';
    const link_pagamento = 'https://livepix.gg/huangzin';

    function enviarPix() {
        const f = document.getElementById('filme').value;
        const e = document.getElementById('episodios').value;
        const u = document.getElementById('usuario').value;

        if(!f || !u) {
            alert("Por favor, preencha os campos!");
            return;
        }

        const msg = `PEDIDO: ${f} (${e}) | NICK: ${u}`;
        window.open(`${link_pagamento}?msg=${encodeURIComponent(msg)}`, '_blank');
    }

    function atualizarFila() {
        Papa.parse(planilha_csv, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(res) {
                const div = document.getElementById('lista-fila');
                div.innerHTML = '';
                res.data.forEach(item => {
                    if(item.Conteúdo) {
                        div.innerHTML += `
                            <div class="card">
                                <strong>${item.Conteúdo}</strong>
                                <div class="card-info">
                                    <span>Por: ${item.Patrocinador}</span>
                                    <span style="color:var(--twitch-purple); font-weight:bold">${item.Status || 'FILA'}</span>
                                </div>
                            </div>
                        `;
                    }
                });
            }
        });
    }

    // Intervalo de 30 segundos para não sobrecarregar o processador do celular
    setInterval(atualizarFila, 30000);
    window.addEventListener('DOMContentLoaded', atualizarFila);
</script>

</body>
</html>
