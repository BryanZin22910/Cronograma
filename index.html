<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma Huangzin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --twitch-purple: #9146ff; --bg-dark: #0e0e10; --card-bg: #1f1f23; --accent: #00ff7f; }
        
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--twitch-purple); }
        
        /* Formulário Simples */
        .order-box { background: #18181b; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        .order-box h2 { font-size: 1.1rem; margin-top: 0; color: var(--accent); text-align: center; }
        
        input { 
            width: 100%; padding: 14px; margin-bottom: 12px; 
            background: #26262c; border: 1px solid #3f3f46; 
            color: white; border-radius: 8px; font-size: 1rem;
        }

        /* Lista de Preços Compacta para Celular */
        .prices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .p-item { background: var(--card-bg); padding: 8px; border-radius: 6px; border-left: 3px solid var(--twitch-purple); font-size: 0.7rem; }
        .p-item b { color: var(--accent); font-size: 0.85rem; display: block; }

        /* Fila de Exibição */
        .fila-title { font-size: 1.2rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .dot { height: 10px; width: 10px; background-color: #ff0000; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .card { background: var(--card-bg); margin-bottom: 10px; padding: 15px; border-radius: 10px; border: 1px solid #2d2d30; }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .card strong { font-size: 1.05rem; }
        .status { background: var(--twitch-purple); padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        .btn-pix { 
            background: var(--accent); color: black; border: none; width: 100%; 
            padding: 16px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .btn-pix:hover { transform: scale(1.02); background: #05ffa1; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎥 Cronograma Huangzin</h1>
    </div>

    <!-- Tabela de Preços Rápida -->
    <div class="prices">
        <div class="p-item"><b>R$ 5</b> Desenho (20m)</div>
        <div class="p-item"><b>R$ 8</b> Anime (25m)</div>
        <div class="p-item"><b>R$ 10</b> Série (30m)</div>
        <div class="p-item"><b>R$ 25</b> Filme (2h)</div>
    </div>

    <!-- Formulário Direto -->
    <div class="order-box">
        <h2>Patrocinar Agora</h2>
        <input type="text" id="filme" placeholder="Nome do Filme / Série / Anime">
        <input type="text" id="episodios" placeholder="Qual episódio? (Ex: Ep 05 ou Filme Inteiro)">
        <input type="text" id="usuario" placeholder="Seu Nick na Twitch">

        <button onclick="enviarPix()" class="btn-pix">Pagar via PIX</button>
    </div>

    <div class="fila-title"><span class="dot"></span> Próximos da Fila</div>
    <div id="lista-fila">Carregando fila...</div>
</div>

<script>
    // Seus links configurados
    const planilha_csv = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSA7ERgcG00cVALxrJrFC_zTlKLNHULOf6QGdKqYP1t7jFop-Bc80yfEbHR5Bc5jmns1GYlInDp_xGX/pub?output=csv';
    const link_pagamento = 'https://livepix.gg/huangzin';

    function enviarPix() {
        const f = document.getElementById('filme').value;
        const e = document.getElementById('episodios').value;
        const u = document.getElementById('usuario').value;

        if(!f || !u) {
            alert("Preencha o nome do conteúdo e seu nick!");
            return;
        }

        // Formata a mensagem para você receber no seu painel
        const msg = `PEDIDO: ${f} (${e}) - Nick: ${u}`;
        const linkFinal = `${link_pagamento}?msg=${encodeURIComponent(msg)}`;
        
        window.open(linkFinal, '_blank');
    }

    function atualizarSite() {
        Papa.parse(planilha_csv, {
            download: true,
            header: true,
            complete: function(res) {
                const div = document.getElementById('lista-fila');
                div.innerHTML = '';
                res.data.forEach(item => {
                    if(item.Conteúdo) {
                        div.innerHTML += `
                            <div class="card">
                                <div class="card-top">
                                    <strong>${item.Conteúdo}</strong>
                                    <span class="status">${item.Status || 'AGUARDANDO'}</span>
                                </div>
                                <div style="font-size: 0.85rem; color: #adadb8;">
                                    Patrocinado por: <b style="color:white">${item.Patrocinador}</b><br>
                                    Duração: ${item.Duração}
                                </div>
                            </div>
                        `;
                    }
                });
            }
        });
    }

    setInterval(atualizarSite, 30000); // Atualiza a cada 30 segundos
    window.addEventListener('DOMContentLoaded', atualizarSite);
</script>

</body>
</html>
